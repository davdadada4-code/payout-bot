name: Keep Alive — Ping Bot

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping /health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 20 \
            "${{ secrets.BOT_HEALTH_URL }}/health")
          echo "Response: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Bot returned $STATUS — possible outage!"
            exit 1
          fi
          echo "✅ Bot is alive"
