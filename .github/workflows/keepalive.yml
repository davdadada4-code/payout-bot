name: Keep Alive — Ping Bot

on:
  schedule:
    # Every 5 minutes (GitHub min interval = 5 min)
    - cron: "*/5 * * * *"
  workflow_dispatch: # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping bot health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 20 \
            "${{ secrets.BOT_HEALTH_URL }}/health")
          echo "Response: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: got $STATUS instead of 200"
          else
            echo "Bot is alive ✅"
          fi
